<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengri Flow | Güvenli Bilgelik Akışı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-tengri {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-tengri:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.5);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            outline: none;
        }

        #toast-box {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
        }

        .comment-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .comment-section.active {
            max-height: 600px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .post-card {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="toast-box"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
                <img src="https://r.resimlink.com/lcywxVz-5Y.png?v=fb9b68b93be119a73bae63ecfb88fd29" alt="Logo" class="w-10 h-10">
                <span class="text-xl font-extrabold tracking-tighter text-sky-400">TENGRİ<span class="text-white">FLOW</span></span>
            </div>

            <div id="auth-nav" class="flex items-center space-x-4">
                <button onclick="openModal('loginModal')" class="text-sm font-bold hover:text-sky-400">Giriş Yap</button>
                <button onclick="openModal('regModal')" class="btn-tengri px-6 py-2 rounded-full text-sm font-black italic">KATIL</button>
            </div>

            <div id="user-nav" class="hidden flex items-center space-x-4">
                <div class="flex items-center space-x-2 bg-slate-900/80 p-1.5 pr-4 rounded-full border border-white/10">
                    <div id="u-avatar" class="w-8 h-8 bg-sky-500 rounded-full flex items-center justify-center font-bold text-xs uppercase shadow-lg">?</div>
                    <span id="u-name" class="text-xs font-bold truncate max-w-[100px]"></span>
                </div>
                <button onclick="logout()" class="text-slate-500 hover:text-rose-500 transition"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto pt-24 px-4 pb-20 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar -->
        <aside class="hidden lg:block lg:col-span-3">
            <div class="glass p-8 rounded-[2.5rem] sticky top-24 border-sky-500/10">
                <div class="text-center mb-8">
                    <div id="side-avatar" class="w-24 h-24 mx-auto bg-slate-800 rounded-3xl mb-4 flex items-center justify-center text-4xl font-black text-sky-400 border-2 border-sky-500/30 shadow-2xl rotate-3 uppercase">?</div>
                    <h3 id="side-display" class="font-extrabold text-xl">Ziyaretçi</h3>
                    <p id="side-handle" class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">@misafir</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-8">
                    <div class="bg-white/5 p-3 rounded-2xl text-center border border-white/5">
                        <div id="count-f" class="font-black text-sky-400">0</div>
                        <div class="text-[9px] uppercase font-black text-slate-600">Takipçi</div>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl text-center border border-white/5">
                        <div id="count-p" class="font-black text-sky-400">0</div>
                        <div class="text-[9px] uppercase font-black text-slate-600">Bilgelik</div>
                    </div>
                </div>

                <nav class="space-y-2">
                    <button onclick="secureAction('Keşfet')" class="w-full flex items-center space-x-4 p-4 rounded-2xl hover:bg-sky-500/10 transition group">
                        <i data-lucide="compass" class="group-hover:text-sky-400 transition"></i>
                        <span class="font-bold text-sm">Keşfet</span>
                    </button>
                    <button onclick="secureAction('Bildirimler')" class="w-full flex items-center space-x-4 p-4 rounded-2xl hover:bg-sky-500/10 transition group">
                        <i data-lucide="bell" class="group-hover:text-sky-400 transition"></i>
                        <span class="font-bold text-sm">Bildirimler</span>
                    </button>
                </nav>
            </div>
        </aside>

        <!-- Feed Area -->
        <div class="lg:col-span-6 space-y-6">
            <!-- Composer -->
            <div class="glass p-6 rounded-[2.5rem] border-white/10 shadow-2xl">
                <div class="flex space-x-4">
                    <div id="comp-avatar" class="w-12 h-12 bg-slate-800 rounded-2xl flex-shrink-0 flex items-center justify-center font-bold text-sky-400 uppercase shadow-inner italic">?</div>
                    <div class="flex-grow">
                        <textarea id="postInput" placeholder="Tengri'nin bilgeliğini buraya yaz..." class="w-full bg-transparent border-none focus:ring-0 text-lg resize-none h-28 placeholder:text-slate-700 outline-none font-medium"></textarea>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5">
                            <div class="flex space-x-5 text-slate-500">
                                <button onclick="toast('Görsel yükleme kapalıdır')" class="hover:text-sky-400 transition"><i data-lucide="camera" class="w-5 h-5"></i></button>
                                <button onclick="toast('Harita yakında')" class="hover:text-sky-400 transition"><i data-lucide="map-pin" class="w-5 h-5"></i></button>
                            </div>
                            <button onclick="submitPost()" class="btn-tengri px-10 py-3 rounded-2xl font-black text-xs uppercase tracking-[0.2em]">YAYINLA</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Posts List -->
            <div id="feed" class="space-y-6"></div>
        </div>

        <!-- Right Panel -->
        <aside class="hidden lg:block lg:col-span-3">
            <div class="glass p-6 rounded-[2.5rem] sticky top-24 space-y-8">
                <div class="bg-sky-500/5 p-4 rounded-3xl border border-sky-500/10">
                    <h4 class="font-black text-xs uppercase text-sky-500 mb-4 tracking-tighter">Günün Gündemi</h4>
                    <div class="space-y-5">
                        <div onclick="secureAction('Etiket')" class="cursor-pointer group">
                            <p class="text-xs font-black group-hover:text-sky-400 transition">#GökTürkçe</p>
                            <p class="text-[10px] text-slate-600 font-bold">2.1K Bilgelik</p>
                        </div>
                        <div onclick="secureAction('Etiket')" class="cursor-pointer group">
                            <p class="text-xs font-black group-hover:text-sky-400 transition">#BozkurtunYolu</p>
                            <p class="text-[10px] text-slate-600 font-bold">890 Bilgelik</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Authentication Modals -->
    <div id="loginModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/90 backdrop-blur-xl p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] border-sky-500/20">
            <h2 class="text-4xl font-black mb-8 text-center italic tracking-tighter text-white">GİRİŞ</h2>
            <div class="space-y-5">
                <input id="l-user" type="text" placeholder="Kullanıcı Adı" class="input-field w-full p-5 rounded-2xl">
                <input id="l-pass" type="password" placeholder="Şifre" class="input-field w-full p-5 rounded-2xl">
                <button onclick="handleLogin()" class="w-full btn-tengri py-5 rounded-2xl font-black text-lg">GİRİŞ YAP</button>
                <p class="text-center text-xs text-slate-500 font-bold">Hesabın yok mu? <button onclick="openModal('regModal'); closeModal('loginModal')" class="text-sky-400">Kayıt Ol</button></p>
            </div>
        </div>
    </div>

    <div id="regModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/90 backdrop-blur-xl p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] border-sky-500/20">
            <h2 class="text-4xl font-black mb-8 text-center italic tracking-tighter text-sky-400 text-white">KAYIT</h2>
            <div class="space-y-4">
                <input id="r-name" type="text" placeholder="Ad Soyad" class="input-field w-full p-5 rounded-2xl">
                <input id="r-user" type="text" placeholder="Kullanıcı Adı" class="input-field w-full p-5 rounded-2xl">
                <input id="r-pass" type="password" placeholder="Şifre" class="input-field w-full p-5 rounded-2xl">
                <button onclick="handleRegister()" class="w-full btn-tengri py-5 rounded-2xl font-black text-lg">HESAP OLUŞTUR</button>
                <p class="text-center text-xs text-slate-500 font-bold">Zaten üye misin? <button onclick="openModal('loginModal'); closeModal('regModal')" class="text-sky-400">Giriş Yap</button></p>
            </div>
        </div>
    </div>

    <script>
        // --- Core Application State ---
        let currentUser = null;
        let db_users = JSON.parse(localStorage.getItem('tengriflow_users')) || {};
        let posts = [];
        const DOMAIN = "tengriflow.io"; // Senin özel alan adın buraya

        // --- Notifications ---
        function toast(msg, type = 'info') {
            const id = Date.now();
            const box = document.getElementById('toast-box');
            const el = document.createElement('div');
            el.className = `p-4 mb-3 rounded-2xl font-bold shadow-2xl flex items-center space-x-3 glass animate-slide-in border-l-4 ${type === 'error' ? 'border-rose-500' : 'border-sky-500'}`;
            el.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'info'}" class="w-4 h-4"></i><span>${msg}</span>`;
            box.appendChild(el);
            lucide.createIcons();
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 3000);
        }

        // --- Modals ---
        function openModal(id) { 
            const m = document.getElementById(id);
            m.classList.replace('hidden', 'flex'); 
        }
        function closeModal(id) { 
            const m = document.getElementById(id);
            m.classList.replace('flex', 'hidden'); 
        }

        // --- Auth System (Secure) ---
        function handleRegister() {
            const name = document.getElementById('r-name').value.trim();
            const user = document.getElementById('r-user').value.trim().toLowerCase();
            const pass = document.getElementById('r-pass').value.trim();

            if(!name || !user || !pass) return toast("Lütfen tüm alanları doldur kanka!", "error");
            if(db_users[user]) return toast("Bu kullanıcı adı zaten alınmış!", "error");
            if(user.length < 3) return toast("Kullanıcı adı çok kısa!", "error");

            db_users[user] = { name, pass, followers: 0, posts: 0 };
            localStorage.setItem('tengriflow_users', JSON.stringify(db_users));
            
            toast("Kayıt başarılı! Şimdi giriş yapabilirsin.");
            closeModal('regModal');
            openModal('loginModal');
        }

        function handleLogin() {
            const user = document.getElementById('l-user').value.trim().toLowerCase();
            const pass = document.getElementById('l-pass').value.trim();

            if(!db_users[user] || db_users[user].pass !== pass) {
                return toast("Hatalı kullanıcı adı veya şifre kanka!", "error");
            }

            currentUser = { handle: user, ...db_users[user] };
            updateUI();
            closeModal('loginModal');
            toast(`Hoş geldin, ${currentUser.name}!`);
        }

        function logout() {
            currentUser = null;
            updateUI();
            toast("Oturum kapatıldı.");
        }

        function secureAction(name) {
            if(!currentUser) {
                toast("Önce giriş yapmalısın!", "error");
                openModal('loginModal');
                return false;
            }
            toast(`${name} yakında seninle!`);
            return true;
        }

        // --- UI Updates ---
        function updateUI() {
            const authN = document.getElementById('auth-nav');
            const userN = document.getElementById('user-nav');
            
            if(currentUser) {
                authN.classList.add('hidden');
                userN.classList.remove('hidden');
                document.getElementById('u-name').innerText = currentUser.name;
                document.getElementById('u-avatar').innerText = currentUser.name[0];
                document.getElementById('side-display').innerText = currentUser.name;
                document.getElementById('side-handle').innerText = '@' + currentUser.handle;
                document.getElementById('side-avatar').innerText = currentUser.name[0];
                document.getElementById('comp-avatar').innerText = currentUser.name[0];
                document.getElementById('count-f').innerText = currentUser.followers;
                document.getElementById('count-p').innerText = currentUser.posts;
            } else {
                authN.classList.remove('hidden');
                userN.classList.add('hidden');
                document.getElementById('side-display').innerText = "Ziyaretçi";
                document.getElementById('side-handle').innerText = "@misafir";
                document.getElementById('side-avatar').innerText = "?";
                document.getElementById('comp-avatar').innerText = "?";
                document.getElementById('count-f').innerText = "0";
                document.getElementById('count-p').innerText = "0";
            }
            renderFeed();
            lucide.createIcons();
        }

        // --- Post System ---
        function submitPost() {
            if(!currentUser) return secureAction();
            const text = document.getElementById('postInput').value.trim();
            if(!text) return toast("Söyleyecek bir şeyin yok mu?", "error");

            const post = {
                id: Math.random().toString(36).substr(2, 9),
                owner: currentUser.handle,
                name: currentUser.name,
                content: text,
                likes: 0,
                liked: false,
                shares: 0,
                comments: [],
                time: "Şimdi"
            };

            posts.unshift(post);
            currentUser.posts++;
            db_users[currentUser.handle].posts++;
            localStorage.setItem('tengriflow_users', JSON.stringify(db_users));
            
            document.getElementById('postInput').value = "";
            updateUI();
            toast("Bilgelik akışa eklendi!");
        }

        function deletePost(id) {
            posts = posts.filter(p => p.id !== id);
            currentUser.posts--;
            db_users[currentUser.handle].posts--;
            localStorage.setItem('tengriflow_users', JSON.stringify(db_users));
            updateUI();
            toast("İleti silindi.");
        }

        function copyPostLink(id) {
            const url = `https://${DOMAIN}/status/${id}`;
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            toast("Özel link panoya kopyalandı!");
        }

        function toggleLike(id) {
            if(!currentUser) return secureAction();
            const p = posts.find(x => x.id === id);
            p.liked = !p.liked;
            p.likes += p.liked ? 1 : -1;
            renderFeed();
        }

        function postComment(id) {
            if(!currentUser) return secureAction();
            const input = document.getElementById(`in-${id}`);
            const text = input.value.trim();
            if(!text) return;

            const p = posts.find(x => x.id === id);
            p.comments.push({ author: currentUser.name, text });
            input.value = "";
            renderFeed();
            document.getElementById(`comments-${id}`).classList.add('active');
        }

        function toggleCommentSection(id) {
            const el = document.getElementById(`comments-${id}`);
            el.classList.toggle('active');
        }

        // --- Renderer ---
        function renderFeed() {
            const feed = document.getElementById('feed');
            if(posts.length === 0) {
                feed.innerHTML = `
                    <div class="text-center py-24 opacity-10">
                        <i data-lucide="shield-off" class="w-20 h-20 mx-auto mb-4"></i>
                        <p class="font-black text-2xl uppercase tracking-tighter">Akış Tertemiz</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            feed.innerHTML = posts.map(p => `
                <div class="glass p-8 rounded-[3rem] post-card relative group border-sky-500/5">
                    ${currentUser && p.owner === currentUser.handle ? `
                        <button onclick="deletePost('${p.id}')" class="absolute top-8 right-8 text-slate-700 hover:text-rose-500 transition opacity-0 group-hover:opacity-100">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    ` : ''}
                    
                    <div class="flex items-center space-x-4 mb-6">
                        <div class="w-12 h-12 bg-sky-500/10 rounded-2xl flex items-center justify-center font-black text-sky-500 shadow-inner uppercase">${p.name[0]}</div>
                        <div>
                            <h4 class="font-black text-white leading-none">${p.name}</h4>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">@${p.owner} • ${p.time}</p>
                        </div>
                    </div>

                    <p class="text-slate-200 text-lg font-medium leading-relaxed mb-8">${p.content.replace(/\n/g, '<br>')}</p>

                    <div class="flex justify-between items-center text-slate-500 border-t border-white/5 pt-6">
                        <button onclick="toggleCommentSection('${p.id}')" class="flex items-center space-x-2 hover:text-sky-400 transition">
                            <i data-lucide="message-circle" class="w-6 h-6"></i>
                            <span class="text-xs font-black">${p.comments.length}</span>
                        </button>
                        <button onclick="toggleLike('${p.id}')" class="flex items-center space-x-2 transition ${p.liked ? 'text-rose-500' : 'hover:text-rose-500'}">
                            <i data-lucide="heart" class="w-6 h-6 ${p.liked ? 'fill-rose-500' : ''}"></i>
                            <span class="text-xs font-black">${p.likes}</span>
                        </button>
                        <button onclick="copyPostLink('${p.id}')" class="hover:text-sky-400 transition">
                            <i data-lucide="share-2" class="w-6 h-6"></i>
                        </button>
                    </div>

                    <div id="comments-${p.id}" class="comment-section mt-6 space-y-4">
                        <div class="flex space-x-3">
                            <input id="in-${p.id}" type="text" placeholder="Yorumunu ekle..." class="input-field flex-grow p-4 rounded-2xl text-sm">
                            <button onclick="postComment('${p.id}')" class="bg-sky-500 p-4 rounded-2xl text-white hover:bg-sky-600"><i data-lucide="send" class="w-5 h-5"></i></button>
                        </div>
                        <div class="space-y-3 max-h-60 overflow-y-auto pr-2">
                            ${p.comments.map(c => `
                                <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                                    <p class="text-[10px] font-black text-sky-500 uppercase mb-1">${c.author}</p>
                                    <p class="text-xs text-slate-300 font-medium">${c.text}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Init
        window.onclick = function(e) {
            if (e.target.classList.contains('bg-slate-950/90')) {
                closeModal('loginModal');
                closeModal('regModal');
            }
        }
        updateUI();
    </script>
</body>
</html>
