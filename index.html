<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengri Flow | Bilgelik Akışı</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #020617;
            --accent-sky: #0ea5e9;
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% -20%, #0c4a6e 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #082f49 0%, transparent 30%);
            background-attachment: fixed;
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.5);
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.95); }

        .nav-blur {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .hide { display: none !important; }
        
        /* Post Avatar Colors */
        .avatar-bg { background: linear-gradient(45deg, #0ea5e9, #6366f1); }
    </style>
</head>
<body class="pb-10">

    <!-- Notifications Area -->
    <div id="toast-container" class="fixed top-24 right-6 z-[200] space-y-3"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-[100] nav-blur h-20">
        <div class="max-w-6xl mx-auto px-6 h-full flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
                <img src="https://r.resimlink.com/lcywxVz-5Y.png?v=fb9b68b93be119a73bae63ecfb88fd29" class="w-10 h-10 object-contain" alt="Logo">
                <span class="text-xl font-black tracking-tighter uppercase">Tengri<span class="text-sky-500">Flow</span></span>
            </div>

            <div id="nav-auth-box">
                <button onclick="authUI.open('login')" class="btn-primary px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider text-white">Giriş</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto pt-28 px-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar -->
        <aside class="hidden lg:block lg:col-span-3">
            <div class="glass-card p-6 sticky top-28 text-center">
                <div id="side-profile-img" class="w-20 h-20 mx-auto bg-slate-800 rounded-3xl mb-4 flex items-center justify-center text-3xl font-black text-sky-500 border border-white/5">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3 id="side-name" class="font-bold text-lg">Ziyaretçi</h3>
                <p id="side-handle" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">@misafir</p>
            </div>
        </aside>

        <!-- Feed -->
        <div class="lg:col-span-6 space-y-6">
            <!-- Composer -->
            <div class="glass-card p-6 relative overflow-hidden">
                <div id="lock-overlay" class="absolute inset-0 bg-slate-950/70 backdrop-blur-sm z-20 flex flex-col items-center justify-center hide">
                    <p class="text-xs font-bold uppercase mb-3">Paylaşmak için katıl</p>
                    <button onclick="authUI.open('register')" class="bg-white text-black px-6 py-2 rounded-full font-black text-[10px] uppercase">KAYDOL</button>
                </div>
                
                <textarea id="post-text" placeholder="Gökten bir mesaj bırak..." class="w-full bg-transparent border-none focus:ring-0 text-lg resize-none h-24 outline-none text-slate-100"></textarea>
                <div class="flex justify-end pt-4 border-t border-white/5">
                    <button id="post-submit" class="btn-primary px-8 py-2.5 rounded-xl font-bold text-xs uppercase text-white">Gönder</button>
                </div>
            </div>

            <!-- Posts List -->
            <div id="feed" class="space-y-6">
                <div class="text-center py-20 opacity-30">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i>
                    <p class="text-xs font-bold uppercase">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-950/90 backdrop-blur-md p-4 hide">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[2.5rem] border border-white/10 relative">
            <button onclick="authUI.close()" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 id="m-title" class="text-2xl font-black text-center mb-8 uppercase">Giriş Yap</h2>
            
            <div class="space-y-4">
                <div id="m-reg-fields" class="hide space-y-4">
                    <input type="text" id="m-name" placeholder="Ad Soyad" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-sky-500">
                    <input type="text" id="m-handle" placeholder="Kullanıcı Adı" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-sky-500">
                </div>
                <input type="email" id="m-email" placeholder="E-posta" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-sky-500">
                <input type="password" id="m-pass" placeholder="Şifre" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-sky-500">
                <button id="m-submit" class="w-full btn-primary py-4 rounded-2xl font-bold text-white uppercase">Devam Et</button>
                <p class="text-center text-xs text-slate-500 mt-4">
                    <span id="m-switch-text">Hesabın yok mu?</span>
                    <button onclick="authUI.toggle()" id="m-switch-btn" class="text-sky-400 font-bold ml-1">Kayıt Ol</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, setDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // CRITICAL: CONFIG FIX
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            // Buraya kendi Firebase Console'undaki config nesnesini yapıştırabilirsin eğer hata alırsan.
            firebaseConfig = {}; 
            console.error("Firebase Config Bulunamadı! Lütfen Cloudflare/Environment ayarlarını kontrol et.");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tengri-flow-v3';
        
        // App Init
        let app, auth, db;
        if (firebaseConfig.apiKey) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } else {
            document.body.innerHTML = "<div class='flex items-center justify-center h-screen text-center p-10'><div class='glass-card p-10'><h1 class='text-2xl font-bold text-rose-500 mb-4'>Firebase Config Hatası!</h1><p class='text-slate-400'>Lütfen projenin ortam değişkenlerini (Environment Variables) Cloudflare veya sistem üzerinden doğru girdiğinden emin ol.</p></div></div>";
        }

        let userState = { uid: null, profile: null, mode: 'login' };

        // UI Handlers
        window.ui = {
            toast: (m, type='success') => {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `p-4 rounded-2xl shadow-xl font-bold text-xs text-white ${type==='success'?'bg-sky-600':'bg-rose-600'} transition-all duration-300`;
                t.innerText = m;
                c.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }
        };

        window.authUI = {
            open: (mode) => {
                userState.mode = mode;
                document.getElementById('auth-modal').classList.remove('hide');
                authUI.sync();
            },
            close: () => document.getElementById('auth-modal').classList.add('hide'),
            toggle: () => {
                userState.mode = userState.mode === 'login' ? 'register' : 'login';
                authUI.sync();
            },
            sync: () => {
                const isL = userState.mode === 'login';
                document.getElementById('m-title').innerText = isL ? 'Giriş Yap' : 'Kayıt Ol';
                document.getElementById('m-reg-fields').classList[isL ? 'add':'remove']('hide');
                document.getElementById('m-switch-text').innerText = isL ? 'Hesabın yok mu?' : 'Üye misin?';
                document.getElementById('m-switch-btn').innerText = isL ? 'Kayıt Ol' : 'Giriş Yap';
            }
        };

        // Auth Logic
        onAuthStateChanged(auth, async (u) => {
            const navBox = document.getElementById('nav-auth-box');
            const sideName = document.getElementById('side-name');
            const sideHandle = document.getElementById('side-handle');
            const lock = document.getElementById('lock-overlay');

            if (u) {
                userState.uid = u.uid;
                const d = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'));
                userState.profile = d.exists() ? d.data() : { name: "Bilge", handle: "user" };
                
                navBox.innerHTML = `<button id="logout" class="text-slate-500 hover:text-rose-500 font-bold text-[10px] uppercase">Çıkış</button>`;
                document.getElementById('logout').onclick = () => signOut(auth);
                
                sideName.innerText = userState.profile.name;
                sideHandle.innerText = `@${userState.profile.handle}`;
                lock.classList.add('hide');
            } else {
                userState.uid = null;
                navBox.innerHTML = `<button onclick="authUI.open('login')" class="btn-primary px-6 py-2.5 rounded-xl text-xs font-bold uppercase text-white">Giriş</button>`;
                sideName.innerText = "Ziyaretçi";
                sideHandle.innerText = "@misafir";
                lock.classList.remove('hide');
            }
        });

        document.getElementById('m-submit').onclick = async () => {
            const e = document.getElementById('m-email').value;
            const p = document.getElementById('m-pass').value;
            try {
                if (userState.mode === 'register') {
                    const n = document.getElementById('m-name').value;
                    const h = document.getElementById('m-handle').value.toLowerCase().trim();
                    const r = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, 'artifacts', appId, 'users', r.user.uid, 'profile', 'info'), { name: n, handle: h, uid: r.user.uid });
                } else {
                    await signInWithEmailAndPassword(auth, e, p);
                }
                authUI.close();
                ui.toast("Başarıyla girildi!");
            } catch (err) { ui.toast(err.message, 'error'); }
        };

        // Post Operations
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), (s) => {
            const posts = s.docs.map(d => ({ id: d.id, ...d.data() }));
            render(posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
        });

        document.getElementById('post-submit').onclick = async () => {
            const txt = document.getElementById('post-text').value;
            if (!userState.uid || !txt.trim()) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                authorId: userState.uid,
                authorName: userState.profile.name,
                authorHandle: userState.profile.handle,
                content: txt,
                likes: [],
                comments: [],
                createdAt: serverTimestamp()
            });
            document.getElementById('post-text').value = '';
        };

        function render(data) {
            const f = document.getElementById('feed');
            if (data.length === 0) { f.innerHTML = `<p class="text-center opacity-20 py-10 font-bold uppercase">Akış Boş</p>`; return; }
            
            f.innerHTML = data.map(p => `
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 avatar-bg rounded-xl flex items-center justify-center font-bold text-white uppercase">${p.authorName[0]}</div>
                            <div>
                                <p class="text-sm font-bold">${p.authorName}</p>
                                <p class="text-[9px] text-slate-500 font-bold uppercase">@${p.authorHandle}</p>
                            </div>
                        </div>
                        ${userState.uid === p.authorId ? `<button onclick="window.delP('${p.id}')" class="text-slate-700 hover:text-rose-500 transition"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                    </div>
                    <p class="text-slate-200 leading-relaxed mb-6 whitespace-pre-wrap">${p.content}</p>
                    <div class="flex items-center space-x-6 text-slate-500 pt-4 border-t border-white/5">
                        <button onclick="window.lk('${p.id}', ${JSON.stringify(p.likes)})" class="flex items-center space-x-2 ${p.likes?.includes(userState.uid) ? 'text-rose-500':'hover:text-rose-500'}">
                            <i class="fa-${p.likes?.includes(userState.uid)?'solid':'regular'} fa-heart"></i>
                            <span class="text-xs font-bold">${p.likes?.length || 0}</span>
                        </button>
                        <button onclick="window.sh('${p.id}')" class="hover:text-sky-400"><i class="fa-solid fa-share-nodes"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Global Actions
        window.lk = async (id, l) => {
            if(!userState.uid) return authUI.open('login');
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id), {
                likes: l.includes(userState.uid) ? arrayRemove(userState.uid) : arrayUnion(userState.uid)
            });
        };
        window.delP = async (id) => { if(confirm("Silinsin mi?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id)); };
        window.sh = (id) => {
            const link = `https://lionaz.github.io/tengriflow/#post-${id}`;
            const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            ui.toast("Bağlantı kopyalandı!");
        };
    </script>
</body>
</html>
